"prefix": "<gray>[</gray><red>GameStats</red><gray>]</gray>"

"command.stats-hologram.desc": "Allows admins to paste a hologram with player-specific statistics into the world."
"command.stats-hologram.create.success": "${prefix} <green>Hologram has been created successfully!</green>"

"command.stats-hologram.remove.failure.already": "${prefix} <red>There is no hologram near you right now!</red>"
"command.stats-hologram.remove.success": "${prefix} <green>Successfully removed hologram!</green>"

"command.stats.desc": "Allows players to view their game statistics."
"command.stat.msg.all.l1": "${prefix} Your statistics:"
"command.stat.msg.specific.l1": "${prefix} Your statistic for <gray>$0</gray>:"
"command.stat.msg.l2": "<gray>[</gray><white>+</white><gray>]</gray> $0"

"command.top.desc": "Returns the top 10 players in the leaderboard according to a specified statistic."
"command.top.msg.all.l1": "${prefix} Leaderboard:"
"command.top.msg.all.l2": "<gray>[</gray><lime>#$0</lime><gray>]</gray> $1 <gray>($2)</gray>"

"stat.text._sep": "<gray>------------------</gray>"
"stat.text._your_stats": "Your statistics:"
"stat.text._leaderboard": "Leaderboard:"
"stat.text._player_stats": "<gold>$0</gold>s statistics:"
"stat.text.wins": "<gray>Games won:</gray> $1"
"stat.text.losses": "<gray>Games lost:</gray> $1"
"stat.text.deaths": "<gray>Total deaths:</gray> $1"
"stat.text.kills": "<gray>Total kills:</gray> $1"
"stat.text.eliminations": "<gray>Total eliminations:</gray> $1"
"stat.text.currentWinStreak": "<gray>Current win streak:</gray> $1"
"stat.text.bestWinStreak": "<gray>Best win streak:</gray> $1"
"stat.text.killRecord": "<gray>Kill record:</gray> $1"
"stat.text.eliminationRecord": "<gray>Elimination record:</gray> $1"
"stat.text.kd": "<gray>K/D:</gray> $1"
"stat.text.netwins": "<gray>Net wins:</gray> $1"
"stat.text.winrate": "<gray>Win rate:</gray> $1%"
"stat.text.totalgames": "<gray>Total games played:</gray> $1"
