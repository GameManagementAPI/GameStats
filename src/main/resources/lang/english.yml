"prefix": "<gray>[</gray><red>GameStats</red><gray>]</gray>"

"command.stats-hologram.desc": "Allows admins to paste a hologram with player-specific statistics into the world."
"command.stats-hologram.create.success": "${prefix} <green>Hologram has been created successfully!</green>"

"command.stats-hologram.remove.failure.already": "${prefix} <red>There is no hologram active right now!</red>"
"command.stats-hologram.remove.success": "${prefix} <green>Successfully removed hologram!</green>"

"hologram.text.sep": "<gray>------------------</gray>"
"hologram.text.your_stats": "Your statistics:"
"hologram.text.player_stats": "<gold>$0</gold>s statistics:"
"hologram.text.wins": "<gray>Games won:</gray> $1"
"hologram.text.losses": "<gray>Games lost:</gray> $1"
"hologram.text.deaths": "<gray>Total deaths:</gray> $1"
"hologram.text.kills": "<gray>Total kills:</gray> $1"
"hologram.text.eliminations": "<gray>Total eliminations:</gray> $1"
"hologram.text.currentWinStreak": "<gray>Current win streak:</gray> $1"
"hologram.text.bestWinStreak": "<gray>Best win streak:</gray> $1"
"hologram.text.killRecord": "<gray>Kill record:</gray> $1"
"hologram.text.eliminationRecord": "<gray>Elimination record:</gray> $1"
"hologram.text.kd": "<gray>K/D:</gray> $1"
"hologram.text.netwins": "<gray>Net wins:</gray> $1"
"hologram.text.winrate": "<gray>Win rate:</gray> $1%"
"hologram.text.totalgames": "<gray>Total games played:</gray> $1"
